backtest:
  data_dir: data
  symbol: BTCUSDT
  start: "2020-01-01"
  end: "2025-01-01"
  bar_seconds: 3600
  init_balance: 1000000.0
  fee_rate: 0.001
  min_trade_notional: 1000.0
  min_weight_change: 0.02

strategy:
  name: lightgbm_btc
  params:
    prediction_horizon_bars: 24
    train_window_bars: 4320
    min_train_bars: 2160
    retrain_every_bars: 24
    valid_bars: 336
    long_threshold: 0.0015
    flat_threshold: 0.0
    max_weight: 0.95
    n_estimators: 400
    num_leaves: 63
    learning_rate: 0.05

output:
  save_bars: true
  save_signal: true
  save_equity: true
  save_trades: true
  save_predictions: true

experiment:
  root_dir: experiments
  overwrite: true
